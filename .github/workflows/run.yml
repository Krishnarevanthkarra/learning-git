name: Update file

on:
  schedule:
    - cron: "0 0 * * *" # Run once for every 3 hours
  workflow_dispatch: # Allows manual triggering

jobs:
  update-readme:
    # Work flow runs on the latest unbuntu environment
    runs-on: ubuntu-latest

    steps:
      # Checkout LeetCode-Stats (source code + Display.svg update target)
      - name: Checkout learning-git repository
        uses: actions/checkout@v4 # Clones a GitHub Repo
        with:
          repository: Krishnarevanthkarra/learning-git # Repo to Clone
          path: learning-git # Saves the cloned repo under the provided name
          token: ${{ secrets.PAT }}  # Token is used for Authentication instead of passwords

      #  Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5 # Set ups a clean python environment
        with:
          python-version: "3.8"

      # Run script to update Display.svg and README.md
      - name: Run Update Script
        run: |
          python learning-git/app.py

      # Commit and push Display.svg to LeetCode-Stats
      - name: Commit Display.svg to LeetCode-Stats
        run: |
          cd learning-git
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add req.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update req.txt"
          git push origin main
